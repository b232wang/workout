services:
  health-ingest:
    build: .
    container_name: health-ingest
    restart: unless-stopped
    ports:
      # Bind to the NAS LAN only. DSM Reverse Proxy terminates public HTTPS in front.
      - "8080:8080"
    volumes:
      - ./data:/data            # health.db persists here, on the NAS
    environment:
      - API_TOKEN=${API_TOKEN}  # set in a .env file next to this compose file
      - PORT=8080
      - DB_PATH=/data/health.db
