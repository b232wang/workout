<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>个人数据 · Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
:root{
  --bg:#f4f5f7;--card:#fff;--ink:#1a1d21;--sub:#6b7280;--line:#e6e8eb;--accent:#3b82f6;
  --workout:#3b82f6;--diet:#f59e0b;--walk:#10b981;--screenshot:#8b5cf6;--note:#94a3b8;--weight:#06b6d4;
}
@media(prefers-color-scheme:dark){:root{--bg:#0f1115;--card:#191c22;--ink:#e8eaed;--sub:#9aa3ad;--line:#2a2e36}}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Segoe UI",sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;padding-bottom:78px;line-height:1.5}
header{padding:22px 16px 10px;position:sticky;top:0;background:var(--bg);z-index:10}
header h1{font-size:21px;font-weight:700;letter-spacing:-.3px}
header .sub{color:var(--sub);font-size:13px;margin-top:3px}
.wrap{padding:0 16px;max-width:680px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:15px;margin-bottom:12px}
.ctitle{font-weight:650;font-size:15px;margin-bottom:10px}
.muted{color:var(--sub)}.small{font-size:12.5px}
.empty{color:var(--sub);text-align:center;padding:26px 8px;font-size:14px}
.date-h{font-size:12.5px;color:var(--sub);font-weight:600;margin:16px 2px 8px}
.datenav{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.datenav button{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:8px 13px;font-size:17px;line-height:1;color:var(--ink);cursor:pointer}
.datenav input[type=date]{flex:1;padding:9px 10px;border:1px solid var(--line);border-radius:10px;background:var(--card);color:var(--ink);font-size:14px;text-align:center}
.datenav .todaybtn{font-size:13px;padding:8px 11px}
.suggest{border-left:3px solid var(--accent)}
.suggest .big{font-size:20px;font-weight:700}
.rest .big{color:var(--sub)}
details summary{cursor:pointer}
.entry .chead{margin-bottom:8px}
.badge{display:inline-block;color:#fff;font-size:12px;font-weight:600;padding:2px 9px;border-radius:999px}
.entry .ctitle{font-size:14px;margin:2px 0 8px}
.ex{display:flex;justify-content:space-between;gap:10px;padding:4px 0 2px;font-size:14px}
.exblock{border-bottom:1px dashed var(--line)}
.exblock:last-child{border-bottom:none}
.exhead{display:flex;justify-content:space-between;gap:8px;align-items:center;font-size:14px;padding:8px 0}
.exhead .exname{flex:1;min-width:0}
details.exblock summary.exhead{cursor:pointer;list-style:none}
details.exblock summary.exhead::-webkit-details-marker{display:none}
details.exblock summary.exhead::after{content:"›";color:var(--sub);font-size:17px;line-height:1;transition:transform .15s;flex:none}
details.exblock[open] summary.exhead::after{transform:rotate(90deg)}
.exdetail{font-size:12.5px;color:var(--sub);padding:2px 0 8px 4px}
.en{color:var(--sub);font-weight:400;font-size:12px}
.note{margin-top:9px;font-size:13px;color:var(--sub);background:rgba(148,163,184,.1);padding:7px 10px;border-radius:9px}
.comment{margin-top:10px;font-size:13px;line-height:1.6;background:rgba(59,130,246,.08);border-left:3px solid var(--accent);padding:9px 11px;border-radius:8px}
.sumline{font-size:13px;line-height:1.65;padding:3px 0}
.shot{max-width:100%;border-radius:10px;margin:4px 0}
.raw{font-size:12px;white-space:pre-wrap;color:var(--sub);overflow-x:auto}
select{width:100%;padding:9px 12px;border:1px solid var(--line);border-radius:10px;background:var(--card);color:var(--ink);font-size:14px;margin-bottom:12px}
.planex{padding:10px 0;border-bottom:1px solid var(--line)}.planex:last-child{border-bottom:none}
.pe-head{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.pe-head b{font-size:14.5px}
.pe-head .muted{margin-left:auto;font-size:13px}
.last{font-size:13px;color:var(--accent);margin-top:3px}
.alt{font-size:12.5px;color:var(--sub);margin-top:3px}
.calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.cell{aspect-ratio:1;border-radius:5px;background:var(--line)}
.slot{font-size:12px;font-weight:700;color:var(--diet);margin:12px 0 5px;letter-spacing:.5px}
.lv1{border:1px solid var(--line);border-radius:10px;margin-bottom:6px;overflow:hidden}
.row1{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:9px 11px;cursor:pointer;list-style:none;font-size:14px}
.row1::-webkit-details-marker{display:none}
details.lv1>summary.row1::after,.foodcard>summary.row1::after{content:"›";color:var(--sub);transition:transform .15s;flex:none}
details.lv1[open]>summary.row1::after,.foodcard[open]>summary.row1::after{transform:rotate(90deg)}
.dishname{flex:1;min-width:0;font-weight:600}
.lv2{margin:0 9px}
.lv2+.lv2,.row2+.lv2{border-top:1px dashed var(--line)}
.row2{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:7px 2px;cursor:pointer;list-style:none;font-size:13.5px}
.row2::-webkit-details-marker{display:none}
.itemname{flex:1;min-width:0}
details.lv2>summary.row2::after{content:"营养 ›";color:var(--sub);font-size:11px;flex:none}
details.lv2[open]>summary.row2::after{content:"营养 ▾"}
.nutri{padding:4px 10px 10px}
.nrow{display:flex;justify-content:space-between;font-size:12.5px;padding:2px 0}
.nrow span:first-child{color:var(--sub)}
.nmuted span{color:var(--sub)}
.totals{margin-top:12px;font-size:13px;font-weight:600;background:rgba(16,185,129,.1);padding:9px 11px;border-radius:8px;border-left:3px solid var(--walk)}
.reflink{font-size:11px;background:rgba(59,130,246,.13);color:var(--accent);border:none;border-radius:6px;padding:2px 7px;cursor:pointer;margin-left:6px;font-weight:500}
.foodcard{padding:0}
.foodcard>summary.row1{padding:13px 15px}
.foodcard.flash{outline:2px solid var(--accent);outline-offset:-2px}
nav.tabs{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--line);display:flex;padding:7px 0 calc(7px + env(safe-area-inset-bottom));z-index:20}
nav.tabs button{background:none;border:none;font-size:10.5px;color:var(--sub);display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;flex:1}
nav.tabs button .ico{font-size:20px;line-height:1}
nav.tabs button.active{color:var(--accent)}
section{display:none}section.active{display:block}
</style>
</head>
<body>
<header>
  <h1>个人数据</h1>
  <div class="sub" id="subline">加载中…</div>
</header>
<main>
  <section id="today" class="active"></section>
  <section id="fitness"></section>
  <section id="calendar"></section>
  <section id="calories"></section>
  <section id="foods"></section>
</main>
<nav class="tabs">
  <button data-tab="today" class="active"><span class="ico">📆</span>今天</button>
  <button data-tab="fitness"><span class="ico">🏋️</span>健身</button>
  <button data-tab="calendar"><span class="ico">📅</span>日历</button>
  <button data-tab="calories"><span class="ico">👤</span>我的</button>
  <button data-tab="foods"><span class="ico">🥫</span>食物库</button>
</nav>
<script>
const CATEGORIES={
  workout:{label:'健身',emoji:'🏋️',color:'var(--workout)'},
  diet:{label:'饮食',emoji:'🍽️',color:'var(--diet)'},
  walk:{label:'活动',emoji:'🚶',color:'var(--walk)'},
  weight:{label:'体重',emoji:'⚖️',color:'var(--weight)'},
  screenshot:{label:'截图',emoji:'📷',color:'var(--screenshot)'},
  note:{label:'随手记',emoji:'📝',color:'var(--note)'},
};
function cat(k){return CATEGORIES[k]||{label:k,emoji:'•',color:'var(--note)'}}

let TL={entries:[]},PLAN={splits:[]},FOODS={foods:[]},PROFILE={},ADVICE={sections:[]};
function iso(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
let selDate=iso(new Date());

function addDays(date,n){const d=new Date(date+'T00:00:00');d.setDate(d.getDate()+n);return iso(d)}
function daysAgo(date){const d=new Date(date+'T00:00:00');const t=new Date();t.setHours(0,0,0,0);const n=Math.round((t-d)/86400000);return n===0?'今天':n===1?'昨天':n>0?n+'天前':(-n)+'天后'}
function byDateDesc(a,b){return a.date<b.date?1:a.date>b.date?-1:0}
function fmtSets(sets){
  if(!sets||!sets.length)return '';
  if(sets.every(s=>s.weight==null&&s.reps==null))return '';
  const w=sets[0].weight,sameW=sets.every(s=>s.weight===w);
  const reps=sets.map(s=>s.reps==null?'?':s.reps).join('/');
  if(sameW&&w!=null)return w+'kg × '+reps;
  return sets.map(s=>(s.weight==null?'?':s.weight)+'kg×'+(s.reps==null?'?':s.reps)).join(', ');
}
function nutritionHtml(o){
  const map=[['protein','蛋白','g'],['fat','脂肪','g'],['saturatedFat','饱和脂肪','g'],['transFat','反式脂肪','g'],['carb','碳水','g'],['sugar','糖','g'],['cholesterolMg','胆固醇','mg'],['sodiumMg','钠','mg'],['potassiumMg','钾','mg'],['calciumMg','钙','mg'],['ironMg','铁','mg']];
  const rows=map.filter(m=>o[m[0]]!=null).map(m=>'<div class="nrow"><span>'+m[1]+'</span><span>'+o[m[0]]+m[2]+'</span></div>');
  if(o.note)rows.push('<div class="nrow nmuted"><span>备注</span><span>'+o.note+'</span></div>');
  return rows.length?'<div class="nutri">'+rows.join('')+'</div>':'';
}

// 体重 & TDEE
function latestWeight(asOf){const ws=TL.entries.filter(e=>e.category==='weight').sort(byDateDesc);if(!ws.length)return null;if(asOf){const m=ws.find(e=>e.date<=asOf);return m?m.data.kg:ws[ws.length-1].data.kg}return ws[0].data.kg}
function tdee(asOf){
  const kg=latestWeight(asOf);
  if(!kg||!PROFILE.age||!PROFILE.heightCm)return null;
  const bmr=10*kg+6.25*PROFILE.heightCm-5*PROFILE.age+(PROFILE.sex==='male'?5:-161);
  const maint=Math.round(bmr*(PROFILE.activityLevel||1.55)/10)*10;
  return {kg,bmr:Math.round(bmr),maint,bulk:maint+250};
}

// 动态每日热量目标:当天活动分档基准 + 近3天周平衡补偿(±300/天)
function dayActivity(date){
  if(TL.entries.some(e=>e.date===date&&e.category==='workout'))return{type:'训练日',coef:1.55,surplus:300};
  if(TL.entries.some(e=>e.date===date&&e.category==='walk'))return{type:'轻活动日',coef:1.4,surplus:200};
  return{type:'休息日',coef:1.3,surplus:200};
}
function dayBaseTarget(date){
  const kg=latestWeight(date);
  if(!kg||!PROFILE.age||!PROFILE.heightCm)return null;
  const bmr=10*kg+6.25*PROFILE.heightCm-5*PROFILE.age+(PROFILE.sex==='male'?5:-161);
  const a=dayActivity(date);
  return Math.round(bmr*a.coef/10)*10+a.surplus;
}
function dayIntake(date){const d=TL.entries.find(e=>e.date===date&&e.category==='diet');return d&&d.data.totals?d.data.totals.kcal:null}
function dailyTarget(date){
  const base=dayBaseTarget(date);
  if(base==null)return null;
  const past=TL.entries.filter(e=>e.category==='diet'&&e.date<date).map(e=>e.date).sort((a,b)=>a<b?1:-1).slice(0,3);
  let debt=0,n=0;
  past.forEach(d=>{const ik=dayIntake(d),b=dayBaseTarget(d);if(ik!=null&&b!=null){debt+=ik-b;n++}});
  const comp=n?Math.max(-300,Math.min(300,Math.round(-debt/10)*10)):0;
  return {target:base+comp,base,comp,type:dayActivity(date).type,debt:Math.round(debt),n};
}
function todayKey(){const d=new Date();if(d.getHours()<4)d.setDate(d.getDate()-1);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}

function splitKeys(){return PLAN.cycleOrder||PLAN.splits.map(s=>s.key)}
function workoutTypeOn(date){const e=TL.entries.find(x=>x.date===date&&x.category==='workout');return e?e.data.type:null}
function lastWorkoutBefore(date){const ws=TL.entries.filter(x=>x.category==='workout'&&x.date<date).sort(byDateDesc);return ws.length?ws[0].data.type:null}
function suggestFor(date){const keys=splitKeys();if(!keys.length)return null;const last=lastWorkoutBefore(date);if(last==null)return keys[0];return keys[(keys.indexOf(last)+1)%keys.length]}

function switchTab(name){
  document.querySelectorAll('nav.tabs button').forEach(x=>x.classList.toggle('active',x.dataset.tab===name));
  document.querySelectorAll('section').forEach(s=>s.classList.toggle('active',s.id===name));
}
function gotoFood(ev,id){
  ev.preventDefault();ev.stopPropagation();
  switchTab('foods');
  const el=document.getElementById('food-'+id);
  if(el){el.open=true;el.scrollIntoView({behavior:'smooth',block:'center'});el.classList.add('flash');setTimeout(()=>el.classList.remove('flash'),1600);}
}

async function load(){
  try{
    const [tl,plan,foods,profile,advice]=await Promise.all([
      fetch('./data/timeline.json').then(r=>r.json()),
      fetch('./data/plan.json').then(r=>r.json()),
      fetch('./data/foods.json').then(r=>r.json()),
      fetch('./data/profile.json').then(r=>r.ok?r.json():{}).catch(()=>({})),
      fetch('./data/advice.json').then(r=>r.ok?r.json():{sections:[]}).catch(()=>({sections:[]})),
    ]);
    TL=tl;PLAN=plan;FOODS=foods;PROFILE=profile||{};ADVICE=advice||{sections:[]};
  }catch(e){
    document.getElementById('subline').textContent='数据加载失败';
    document.getElementById('today').innerHTML='<div class="wrap"><div class="card empty">数据加载失败:'+e.message+'</div></div>';
    return;
  }
  document.getElementById('subline').textContent=TL.entries.length+' 条记录 · '+new Set(TL.entries.map(e=>e.date)).size+' 天';
  renderDay();renderFitness();renderCalendar();renderCalories();renderFoods();
}

function exerciseHtml(x){
  const s=fmtSets(x.sets);
  const nameHtml=x.name+(x.nameEn?' <span class="en">'+x.nameEn+'</span>':'');
  const right=s?'<span class="muted">'+s+'</span>':'';
  const meta=[];
  if(x.equipment)meta.push('<div class="exdetail">器械:'+x.equipment+(x.equipmentEn?' <span class="en">'+x.equipmentEn+'</span>':'')+'</div>');
  if(x.target)meta.push('<div class="exdetail">部位:'+x.target+(x.targetEn?' <span class="en">'+x.targetEn+'</span>':'')+'</div>');
  if(x.note)meta.push('<div class="exdetail">备注:'+x.note+'</div>');
  if(!meta.length)return '<div class="exblock"><div class="exhead"><span class="exname">'+nameHtml+'</span>'+right+'</div></div>';
  return '<details class="exblock"><summary class="exhead"><span class="exname">'+nameHtml+'</span>'+right+'</summary>'+meta.join('')+'</details>';
}

function dietHtml(d){
  let body='';
  (d.meals||[]).forEach(m=>{
    const slotKcal=(m.dishes||[]).reduce((a,x)=>a+(x.kcal||0),0);
    body+='<div class="slot">'+(m.slot||'其他')+' · '+slotKcal+' 卡</div>';
    (m.dishes||[]).forEach(dish=>{
      const items=dish.items||[];
      const ref=dish.ref?' <button class="reflink" onclick="gotoFood(event,\''+dish.ref+'\')">库 ›</button>':'';
      const dhead='<span class="dishname">'+dish.name+ref+'</span>'+(dish.kcal!=null?'<span class="muted">'+dish.kcal+' 卡</span>':'');
      if(items.length<=1){
        // 单品:点开直接看营养
        const nut=items.length?nutritionHtml(items[0]):'';
        body+=nut?'<details class="lv1"><summary class="row1">'+dhead+'</summary>'+nut+'</details>':'<div class="lv1"><div class="row1">'+dhead+'</div></div>';
      }else{
        // 组合:组 > 项 > 营养
        let inner='';
        items.forEach(it=>{
          const nut=nutritionHtml(it);
          const ih='<span class="itemname">'+it.name+(it.qty?' <span class="en">'+it.qty+'</span>':'')+'</span>'+(it.kcal!=null?'<span class="muted">'+it.kcal+' 卡</span>':'');
          inner+=nut?'<details class="lv2"><summary class="row2">'+ih+'</summary>'+nut+'</details>':'<div class="lv2"><div class="row2">'+ih+'</div></div>';
        });
        body+='<details class="lv1"><summary class="row1">'+dhead+'</summary>'+inner+'</details>';
      }
    });
  });
  if(d.totals){const t=d.totals;body+='<div class="totals">全天 '+t.kcal+' 卡 · 蛋白 '+t.protein+'g · 碳水 '+t.carb+'g · 脂肪 '+t.fat+'g</div>';}
  return body;
}

function renderCard(e){
  const c=cat(e.category);let body='';
  if(e.category==='workout'){
    const d=e.data;
    body='<div class="ctitle">'+(d.type||'')+(d.round?' · 第'+d.round+'轮':'')+'</div>';
    body+='<div>'+(d.exercises||[]).map(exerciseHtml).join('')+'</div>';
    if(d.comment)body+='<div class="comment">'+d.comment+'</div>';
  }else if(e.category==='diet'){
    body=dietHtml(e.data);
  }else if(e.category==='weight'){
    body='<div class="ex"><span>体重</span><span class="muted">'+e.data.kg+' kg</span></div>';
  }else if(e.category==='walk'){
    const d=e.data;body=[d.durationMin?d.durationMin+' 分钟':'',d.distanceKm?d.distanceKm+' km':''].filter(Boolean).join(' · ')||'活动';
  }else if(e.category==='screenshot'){
    const d=e.data;body=(d.image?'<img class="shot" src="'+d.image+'">':'')+(d.source?'<div class="muted small">来源:'+d.source+'</div>':'');
  }else if(e.category==='note'){
    body=(e.data&&e.data.text)||'';
  }else{
    body='<pre class="raw">'+JSON.stringify(e.data,null,2)+'</pre>';
  }
  return '<div class="card entry" style="border-left:3px solid '+c.color+'"><div class="chead"><span class="badge" style="background:'+c.color+'">'+c.emoji+' '+c.label+'</span></div>'+body+(e.note?'<div class="note">'+e.note+'</div>':'')+'</div>';
}

// 当天小结:按真实数据生成,回顾性
function daySummaryHtml(date){
  const w=workoutTypeOn(date);
  const diet=TL.entries.find(e=>e.date===date&&e.category==='diet');
  if(!w&&!diet)return '';
  const t=tdee(date),lines=[];
  const sp=w?PLAN.splits.find(s=>s.key===w):null;
  lines.push('训练:'+(w?('练了 '+(sp?sp.label:w)):'无记录(休息)'));
  if(diet&&diet.data.totals){
    const tot=diet.data.totals;
    const mP=tot.kcal?Math.round((tot.protein||0)*4/tot.kcal*100):0, mC=tot.kcal?Math.round((tot.carb||0)*4/tot.kcal*100):0, mF=tot.kcal?Math.round((tot.fat||0)*9/tot.kcal*100):0;
    let s='饮食:摄入 '+tot.kcal+' 卡(蛋白 '+tot.protein+'g('+mP+'%) / 碳水 '+tot.carb+'g('+mC+'%) / 脂肪 '+tot.fat+'g('+mF+'%))';
    if(t){
      const dt=dailyTarget(date), goal=dt?dt.target:t.bulk;
      const gap=tot.kcal-goal, ppk=(tot.protein/t.kg);
      const pr=PROFILE.proteinPerKg||[1.6,2], pLow=Math.round(t.kg*pr[0]), pHigh=Math.round(t.kg*pr[1]);
      const compTxt=dt?(dt.comp>0?'(今日'+dt.type+'基准 '+dt.base+' + 补近期缺口 '+dt.comp+')':dt.comp<0?'(今日'+dt.type+'基准 '+dt.base+' 回收近期盈余 '+dt.comp+')':'(今日'+dt.type+')'):'';
      s+='。今日目标约 '+goal+' 卡'+compTxt+',这天'+(gap<-300?('缺口 '+(-gap)+' 卡、明显偏少'):gap>300?('盈余 '+gap+' 卡'):'基本达标');
      s+=';蛋白 '+tot.protein+'g('+ppk.toFixed(2)+'g/kg),目标 '+pLow+'-'+pHigh+'g '+(tot.protein>=pLow?'(达标)':('(还差 '+(pLow-tot.protein)+'g)'))+'。';
    }
    lines.push(s);
  }else lines.push('饮食:无记录');
  return '<div class="card"><div class="ctitle">这天小结</div>'+lines.map(l=>'<div class="sumline">'+l+'</div>').join('')+'</div>';
}

function renderDay(){
  const el=document.getElementById('today');
  const d=selDate, todayStr=iso(new Date());
  const dayEntries=TL.entries.filter(e=>e.date===d);
  const done=workoutTypeOn(d);
  let html='<div class="wrap">';
  html+='<div class="datenav"><button id="prevd" aria-label="前一天">‹</button><input type="date" id="datepick" value="'+d+'"><button id="nextd" aria-label="后一天">›</button><button id="todayb" class="todaybtn">今天</button></div>';
  if(done){
    const sp=PLAN.splits.find(s=>s.key===done);
    html+='<div class="card suggest"><div class="muted small">这天的训练</div><div class="big">已练:'+(sp?sp.label:done)+'</div></div>';
  }else if(d>=todayStr){
    const sug=suggestFor(d), sp=PLAN.splits.find(s=>s.key===sug);
    html+='<div class="card suggest"><div class="muted small">'+(d===todayStr?'今天建议':'建议')+'(循环顺延)</div><div class="big">练 '+(sp?sp.label:sug)+'</div>';
    if(sp)html+='<details><summary class="muted small" style="margin-top:8px;list-style:none">▸ 看动作</summary>'+sp.exercises.map(x=>'<div class="ex"><span>'+x.name+(x.superset?' 〔超'+x.superset+'〕':'')+'</span><span class="muted">'+x.setsReps+'</span></div>').join('')+'</details>';
    html+='</div>';
  }else{
    html+='<div class="card suggest rest"><div class="muted small">'+d+' · '+daysAgo(d)+'</div><div class="big">休息日</div><div class="muted small">这天没有训练记录</div></div>';
  }
  if(dayEntries.length){
    html+='<div class="date-h">这天的记录('+dayEntries.length+')</div>';
    dayEntries.forEach(e=>html+=renderCard(e));
  }else{
    html+='<div class="card empty">这天没有任何记录</div>';
  }
  html+=daySummaryHtml(d);
  el.innerHTML=html+'</div>';
  document.getElementById('prevd').onclick=()=>{selDate=addDays(selDate,-1);renderDay()};
  document.getElementById('nextd').onclick=()=>{selDate=addDays(selDate,1);renderDay()};
  document.getElementById('todayb').onclick=()=>{selDate=iso(new Date());renderDay()};
  document.getElementById('datepick').onchange=ev=>{if(ev.target.value){selDate=ev.target.value;renderDay()}};
}

function allWorkoutNames(){const s=new Set();TL.entries.filter(e=>e.category==='workout').forEach(e=>(e.data.exercises||[]).forEach(x=>s.add(x.name)));return [...s]}
function workoutHistory(name){
  const out=[];
  TL.entries.filter(e=>e.category==='workout').forEach(e=>{
    const ex=(e.data.exercises||[]).find(x=>x.name===name);if(!ex)return;
    const ws=ex.sets.filter(s=>s.weight!=null);
    out.push({date:e.date,maxWeight:ws.length?Math.max(...ws.map(s=>s.weight)):null,volume:ex.sets.reduce((a,s)=>a+((s.weight||0)*(s.reps||0)),0)||null});
  });
  return out.sort((a,b)=>a.date<b.date?-1:1);
}
function lastResult(name){
  const h=TL.entries.filter(e=>e.category==='workout'&&(e.data.exercises||[]).some(x=>x.name===name)).sort(byDateDesc);
  if(!h.length)return null;const ex=h[0].data.exercises.find(x=>x.name===name);return {date:h[0].date,sets:ex.sets};
}
let chart;
function drawTrend(name){
  const h=workoutHistory(name),note=document.getElementById('trendnote'),cv=document.getElementById('trend');
  if(chart)chart.destroy();
  if(!h.some(p=>p.maxWeight!=null)){note.textContent='这个动作还没记录重量,记几次就有曲线了。';cv.style.display='none';return}
  cv.style.display='';note.textContent='';
  chart=new Chart(cv,{type:'line',
    data:{labels:h.map(p=>p.date.slice(5)),datasets:[
      {label:'最大重量(kg)',data:h.map(p=>p.maxWeight),borderColor:'#3b82f6',backgroundColor:'#3b82f6',tension:.3,spanGaps:true},
      {label:'容量',data:h.map(p=>p.volume),borderColor:'#f59e0b',backgroundColor:'#f59e0b',tension:.3,spanGaps:true,hidden:true},
    ]},
    options:{responsive:true,plugins:{legend:{labels:{boxWidth:12,font:{size:11}}}},scales:{y:{beginAtZero:false}}}});
}
function renderFitness(){
  const el=document.getElementById('fitness'),names=allWorkoutNames();
  let html='<div class="wrap"><div class="card"><div class="ctitle">进步趋势</div>';
  if(names.length)html+='<select id="exsel">'+names.map(n=>'<option>'+n+'</option>').join('')+'</select><canvas id="trend" height="170"></canvas><div class="muted small" id="trendnote"></div>';
  else html+='<div class="empty">还没有健身记录,报一次训练就能看趋势。</div>';
  html+='</div>';
  const order=splitKeys();
  [...PLAN.splits].sort((a,b)=>order.indexOf(a.key)-order.indexOf(b.key)).forEach(sp=>{
    html+='<div class="card"><div class="ctitle">'+sp.label+'</div>';
    sp.exercises.forEach(x=>{
      const lr=lastResult(x.name);
      html+='<div class="planex"><div class="pe-head"><b>'+x.name+'</b>'+(x.superset?'<span class="en">〔超'+x.superset+'〕</span>':'')+'<span class="muted">'+x.setsReps+'</span></div>';
      html+='<div class="muted small">'+x.target+' · '+x.cue+'</div>';
      if(lr){const s=fmtSets(lr.sets);html+='<div class="last">上次('+daysAgo(lr.date)+')'+(s?': '+s:' 练过(没记重量)')+'</div>';}
      html+='<div class="alt">备用:'+x.alternates.join(' / ')+'</div></div>';
    });
    html+='</div>';
  });
  el.innerHTML=html+'</div>';
  if(names.length){const sel=document.getElementById('exsel');sel.onchange=()=>drawTrend(sel.value);drawTrend(names[0]);}
}

function renderCalendar(){
  const el=document.getElementById('calendar');
  const m={};TL.entries.forEach(e=>{(m[e.date]=m[e.date]||new Set()).add(e.category)});
  const weeks=12,t=new Date();t.setHours(0,0,0,0);
  let html='<div class="wrap"><div class="card"><div class="ctitle">近 '+weeks+' 周</div><div class="calgrid">';
  for(let i=weeks*7-1;i>=0;i--){
    const d=new Date(t);d.setDate(t.getDate()-i);const ds=iso(d),cats=m[ds];
    const color=cats&&cats.size?cat([...cats][0]).color:'';
    html+='<div class="cell"'+(color?' style="background:'+color+'"':'')+' title="'+ds+(cats?' · '+[...cats].map(k=>cat(k).label).join(','):'')+'"></div>';
  }
  let s=0;for(let i=0;;i++){const d=new Date(t);d.setDate(t.getDate()-i);if(m[iso(d)])s++;else break}
  html+='</div><div class="muted small" style="margin-top:10px">连续打卡 '+s+' 天 · 共记录 '+Object.keys(m).length+' 天</div></div></div>';
  el.innerHTML=html;
}

let wchart;
function renderCalories(){
  const el=document.getElementById('calories'),t=tdee();
  let html='<div class="wrap">';
  if(t){
    const pr=PROFILE.proteinPerKg||[1.8,2], carbPct=PROFILE.carbPct||55;
    const dt=dailyTarget(todayKey()), goal=dt?dt.target:t.bulk;
    // ① 我的设定(写死的输入)
    html+='<div class="card"><div class="ctitle">① 我的设定 <span class="muted small" style="font-weight:400">· 写死的输入</span></div>';
    html+='<div class="ex"><span>身高</span><span class="muted">'+(PROFILE.heightCm||'-')+' cm</span></div>';
    html+='<div class="ex"><span>年龄 / 性别</span><span class="muted">'+(PROFILE.age||'-')+' · '+(PROFILE.sex==='male'?'男':PROFILE.sex==='female'?'女':'-')+'</span></div>';
    html+='<div class="ex"><span>当前体重</span><span class="muted">'+t.kg+' kg</span></div>';
    html+='<div class="ex"><span>目标</span><span class="muted">'+(PROFILE.goal||'-')+'</span></div>';
    html+='<div class="ex"><span>蛋白倍数</span><span class="muted">'+pr[0]+'–'+pr[1]+' ×体重</span></div>';
    html+='<div class="ex"><span>碳水占比</span><span class="muted">'+carbPct+'%</span></div>';
    html+='<div class="ex"><span>活动系数</span><span class="muted">'+(PROFILE.activityLevel||1.55)+'</span></div>';
    html+='</div>';
    // ② 推算(自动算出)
    const pLow=Math.round(t.kg*pr[0]), pHigh=Math.round(t.kg*pr[1]), pMid=Math.round((pLow+pHigh)/2);
    const carbG=Math.round(goal*carbPct/100/4), fatG=Math.max(0,Math.round((goal-pMid*4-carbG*4)/9));
    const pct=(g,k)=>Math.round(g*k/goal*100);
    html+='<div class="card"><div class="ctitle">② 推算 <span class="muted small" style="font-weight:400">· 自动算出</span></div>';
    html+='<div class="ex"><span>BMR 基础代谢</span><span class="muted">'+t.bmr+' 卡</span></div>';
    html+='<div class="ex"><span>维持需求</span><span class="muted">'+t.maint+' 卡/天</span></div>';
    html+='<div class="ex"><span>今日目标</span><span class="muted">'+goal+' 卡'+(dt?' · '+dt.type+(dt.comp?(dt.comp>0?' +'+dt.comp:' '+dt.comp):''):'')+'</span></div>';
    if(dt){const rc=c=>Math.round(t.bmr*c/10)*10;html+='<div class="muted small" style="margin:2px 0 6px">训练日~'+(rc(1.55)+300)+' / 轻活动~'+(rc(1.4)+200)+' / 休息~'+(rc(1.3)+200)+' 卡,再按近 3 天盈亏 ±300 平衡</div>';}
    html+='<div class="ex"><span>蛋白目标</span><span class="muted">'+pLow+'–'+pHigh+' g('+pct(pMid,4)+'%)</span></div>';
    html+='<div class="ex"><span>碳水目标</span><span class="muted">'+carbG+' g('+carbPct+'%)</span></div>';
    html+='<div class="ex"><span>脂肪目标</span><span class="muted">'+fatG+' g('+pct(fatG,9)+'%)</span></div>';
    const ws=TL.entries.filter(e=>e.category==='weight').sort((a,b)=>a.date<b.date?-1:1);
    if(ws.length>1)html+='<canvas id="wchart" height="150" style="margin-top:10px"></canvas>';
    else html+='<div class="muted small" style="margin-top:8px">再记几次体重就能看变化趋势。</div>';
    html+='</div>';
  }else html+='<div class="card empty">还没有个人信息或体重,无法算每日需求。</div>';
  const diet=TL.entries.filter(e=>e.category==='diet');
  if(diet.length){
    const by={};diet.forEach(e=>{const tt=e.data.totals||{};const b=by[e.date]=by[e.date]||{kcal:0,protein:0};b.kcal+=(tt.kcal||0);b.protein+=(tt.protein||0)});
    html+='<div class="card"><div class="ctitle">每日摄入(估算)</div>';
    Object.keys(by).sort().reverse().forEach(d=>{const dg=dailyTarget(d),goal2=dg?dg.target:(t?t.bulk:null);const g=goal2!=null?(by[d].kcal-goal2):null;html+='<div class="ex"><span>'+d+' <span class="muted small">'+daysAgo(d)+'</span></span><span class="muted">'+by[d].kcal+' 卡'+(by[d].protein?' · '+by[d].protein+'g 蛋白':'')+(g!=null?' <span class="small">('+(g>=0?'+':'')+g+' vs 目标)</span>':'')+'</span></div>'});
    html+='</div>';
  }
  html+=renderAdvice();
  el.innerHTML=html+'</div>';
  const ws=TL.entries.filter(e=>e.category==='weight').sort((a,b)=>a.date<b.date?-1:1);
  if(t&&ws.length>1){
    if(wchart)wchart.destroy();
    wchart=new Chart(document.getElementById('wchart'),{type:'line',data:{labels:ws.map(e=>e.date.slice(5)),datasets:[{label:'体重(kg)',data:ws.map(e=>e.data.kg),borderColor:'#06b6d4',backgroundColor:'#06b6d4',tension:.3}]},options:{responsive:true,plugins:{legend:{labels:{boxWidth:12,font:{size:11}}}},scales:{y:{beginAtZero:false}}}});
  }
}
// ③ 建议库:把问过的咨询沉淀成数据
function renderAdvice(){
  if(!ADVICE.sections||!ADVICE.sections.length)return '';
  const tag=f=>'<span style="font-size:10px;padding:1px 6px;border-radius:8px;margin-left:5px;'+(f==='增肌'?'background:#e0f2fe;color:#0369a1':'background:#fef3c7;color:#b45309')+'">'+f+'</span>';
  const row=(r,bad)=>{
    let x='<div style="margin:9px 0 11px">';
    x+='<div class="ex" style="align-items:baseline"><span>'+(bad?'<span style="color:#dc2626">✕ </span>':'')+'<b>'+r.name+'</b>'+(r.nameEn?' <span class="en">'+r.nameEn+'</span>':'')+'</span><span class="muted" style="flex:none;margin-left:8px">'+(r.kcal?r.kcal+' 卡':'')+'</span></div>';
    const sub=[r.protein?'蛋白 '+r.protein+'g':'',r.price||''].filter(Boolean).join(' · ');
    if(sub||(!bad&&r.for))x+='<div class="muted small" style="margin-top:1px">'+sub+(!bad&&r.for?' '+(r.for||[]).map(tag).join(''):'')+'</div>';
    x+='<div class="small" style="margin-top:2px">'+r.why+'</div>';
    return x+'</div>';
  };
  let h='<div class="card"><div class="ctitle">③ 给我的建议库 <span class="muted small" style="font-weight:400">· 我问过的咨询</span></div>';
  if(ADVICE.updated)h+='<div class="muted small">更新 '+ADVICE.updated+'</div>';
  if(ADVICE.note)h+='<div class="muted small" style="margin-bottom:6px">'+ADVICE.note+'</div>';
  ADVICE.sections.forEach(s=>{
    h+='<details class="exblock" style="margin:6px 0"><summary class="exhead"><span class="exname">'+s.title+(s.titleEn?' <span class="en">'+s.titleEn+'</span>':'')+'</span></summary>';
    if(s.tip)h+='<div class="muted small" style="margin:5px 0">'+s.tip+'</div>';
    (s.recommend||[]).forEach(r=>h+=row(r,false));
    (s.avoid||[]).forEach(r=>h+=row(r,true));
    h+='</details>';
  });
  return h+'</div>';
}

function renderFoods(){
  const el=document.getElementById('foods');
  if(!FOODS.foods||!FOODS.foods.length){el.innerHTML='<div class="wrap"><div class="card empty">食物库还是空的。</div></div>';return}
  let html='<div class="wrap"><div class="card"><div class="ctitle">食物库 · Food Library</div><div class="muted small">你给过的组合和单品都在这,点开看营养。报饮食时我从这里查;数据变了告诉我就更新。</div></div>';
  FOODS.foods.forEach(f=>{
    html+='<details class="card foodcard" id="food-'+f.id+'"><summary class="row1"><span class="dishname"><b>'+f.name+'</b>'+(f.nameEn?' <span class="en">'+f.nameEn+'</span>':'')+'</span><span class="muted small">'+(f.serving||'')+(f.kcal!=null?' · '+f.kcal+'卡':'')+'</span></summary>';
    if(f.components)html+='<div class="nutri"><div class="nrow nmuted"><span>配料</span><span>'+f.components.join(' + ')+'</span></div></div>';
    html+=nutritionHtml(f);
    if(f.aliases&&f.aliases.length)html+='<div class="nutri"><div class="nrow nmuted"><span>别名/口令</span><span>'+f.aliases.join('、')+'</span></div></div>';
    html+='</details>';
  });
  el.innerHTML=html+'</div>';
}
